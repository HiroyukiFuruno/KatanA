# lefthook.yml
output:
  - failure

pre-commit:
  parallel: false
  commands:
    formatting:
      glob: "*.rs"
      run: make fmt
    clippy:
      glob: "*.rs"
      run: make lint
    ast-lint:
      glob: "*.rs"
      run: make ast-lint

pre-push:
  commands:
    ci-strict:
      run: make -j 2 check
      only:
        - ref: master
        - ref: release/*
      skip:
        - ref: release/*-task*

    ci-light:
      run: make check-light
      skip:
        - ref: master
      only:
        - ref: release/*-task*
        - ref: feature/*
        - ref: bugfix/*
