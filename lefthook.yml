# lefthook.yml
pre-commit:
  parallel: true
  commands:
    formatting:
      glob: "*.rs"
      run: make fmt
    clippy:
      glob: "*.rs"
      run: make lint
    ast-lint:
      glob: "*.rs"
      run: make ast-lint

pre-push:
  commands:
    ci-strict:
      run: make check
      glob: "*.{rs,toml,lock}"
      only:
        - ref: master
        - ref: release/*

    ci-light:
      run: make check-light
      glob: "*.{rs,toml,lock}"
      skip:
        - ref: master
        - ref: release/*
