# lefthook.yml
output: false

pre-commit:
  parallel: false
  commands:
    formatting:
      glob: "*.rs"
      run: make fmt
    clippy:
      glob: "*.rs"
      run: make lint
    ast-lint:
      glob: "*.rs"
      run: make ast-lint

pre-push:
  commands:
    pr-ready-check:
      run: ./scripts/release/check-pr-ready.sh
    check-strict:
      run: make -j 2 check
      glob: "*.{rs,toml,lock}"
      only:
        - ref: master
        - ref: release/*

    check-light:
      run: make check-light
      glob: "*.{rs,toml,lock}"
      skip:
        - ref: master
        - ref: release/*

pre-pr:
  commands:
    validation:
      run: ./scripts/release/check-pr-ready.sh
