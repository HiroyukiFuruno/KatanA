# lefthook.yml
pre-commit:
  parallel: true
  commands:
    formatting:
      glob: "*.rs"
      run: make fmt
    clippy:
      glob: "*.rs"
      run: make lint
    ast-lint:
      glob: "*.rs"
      run: make ast-lint

pre-push:
  commands:
    ci:
      glob: "*.{rs,toml,lock}"
      run: make check
