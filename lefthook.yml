# lefthook.yml
no_tty: true
output:
  - failure

pre-commit:
  parallel: false
  commands:
    formatting:
      run: just fmt
    biome-js-lint:
      glob: "*.{js,ts}"
      run: just biome-js-lint
    clippy:
      glob: "crates/**/*.{rs,toml,lock}"
      run: just lint
    ast-lint:
      glob: "crates/**/*.{rs,toml,lock}"
      run: just ast-lint

pre-push:
  commands:
    pr-ready-check:
      run: ./scripts/release/check-pr-ready.sh
      only:
        - ref: master
        - ref: release/*
    check-strict:
      run: just check
      glob: "crates/**/*.{rs,toml,lock}"
      only:
        - ref: master
        - ref: release/*

    check-light:
      run: just check-light
      glob: "crates/**/*.{rs,toml,lock}"
      skip:
        - ref: master
        - ref: release/*

pre-pr:
  commands:
    validation:
      run: ./scripts/release/check-pr-ready.sh
