<svg id="official-01-flowchart" width="195" xmlns="http://www.w3.org/2000/svg" class="flowchart" height="417" viewBox="0 0 195 417" role="graphics-document document" aria-roledescription="flowchart-v2"><style>#official-01-flowchart{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#E0E0E0;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#official-01-flowchart .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#official-01-flowchart .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#official-01-flowchart .error-icon{fill:#a44141;}#official-01-flowchart .error-text{fill:#ddd;stroke:#ddd;}#official-01-flowchart .edge-thickness-normal{stroke-width:1px;}#official-01-flowchart .edge-thickness-thick{stroke-width:3.5px;}#official-01-flowchart .edge-pattern-solid{stroke-dasharray:0;}#official-01-flowchart .edge-thickness-invisible{stroke-width:0;fill:none;}#official-01-flowchart .edge-pattern-dashed{stroke-dasharray:3;}#official-01-flowchart .edge-pattern-dotted{stroke-dasharray:2;}#official-01-flowchart .marker{fill:#AAAAAA;stroke:#AAAAAA;}#official-01-flowchart .marker.cross{stroke:#AAAAAA;}#official-01-flowchart svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#official-01-flowchart p{margin:0;}#official-01-flowchart .label{font-family:"trebuchet ms",verdana,arial,sans-serif;color:#E0E0E0;}#official-01-flowchart .cluster-label text{fill:#E0E0E0;}#official-01-flowchart .cluster-label span{color:#E0E0E0;}#official-01-flowchart .cluster-label span p{background-color:transparent;}#official-01-flowchart .label text,#official-01-flowchart span{fill:#E0E0E0;color:#E0E0E0;}#official-01-flowchart .node rect,#official-01-flowchart .node circle,#official-01-flowchart .node ellipse,#official-01-flowchart .node polygon,#official-01-flowchart .node path{fill:#2D2D2D;stroke:#ccc;stroke-width:1px;}#official-01-flowchart .rough-node .label text,#official-01-flowchart .node .label text,#official-01-flowchart .image-shape .label,#official-01-flowchart .icon-shape .label{text-anchor:middle;}#official-01-flowchart .node .katex path{fill:#000;stroke:#000;stroke-width:1px;}#official-01-flowchart .rough-node .label,#official-01-flowchart .node .label,#official-01-flowchart .image-shape .label,#official-01-flowchart .icon-shape .label{text-align:center;}#official-01-flowchart .node.clickable{cursor:pointer;}#official-01-flowchart .root .anchor path{fill:#AAAAAA!important;stroke-width:0;stroke:#AAAAAA;}#official-01-flowchart .arrowheadPath{fill:lightgrey;}#official-01-flowchart .edgePath .path{stroke:#AAAAAA;stroke-width:1px;}#official-01-flowchart .flowchart-link{stroke:#AAAAAA;fill:none;}#official-01-flowchart .edgeLabel{background-color:#2D2D2D;text-align:center;}#official-01-flowchart .edgeLabel p{background-color:#2D2D2D;}#official-01-flowchart .edgeLabel rect{opacity:0.5;background-color:#2D2D2D;fill:#2D2D2D;}#official-01-flowchart .labelBkg{background-color:rgba(45, 45, 45, 0.5);}#official-01-flowchart .cluster rect{fill:hsl(0, 0%, 33.6470588235%);stroke:rgba(255, 255, 255, 0.25);stroke-width:1px;}#official-01-flowchart .cluster text{fill:#E0E0E0;}#official-01-flowchart .cluster span{color:#E0E0E0;}#official-01-flowchart div.mermaidTooltip{position:absolute;text-align:center;max-width:200px;padding:2px;font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:12px;background:#2D2D2D;border:1px solid rgba(255, 255, 255, 0.25);border-radius:2px;pointer-events:none;z-index:100;}#official-01-flowchart .flowchartTitleText{text-anchor:middle;font-size:18px;fill:#E0E0E0;}#official-01-flowchart rect.text{fill:none;stroke-width:0;}#official-01-flowchart .icon-shape,#official-01-flowchart .image-shape{background-color:#2D2D2D;text-align:center;}#official-01-flowchart .icon-shape p,#official-01-flowchart 