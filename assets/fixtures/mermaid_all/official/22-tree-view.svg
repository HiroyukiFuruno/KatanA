<svg id="official-22-tree-view" width="100%" xmlns="http://www.w3.org/2000/svg" viewBox="-0.5 0 124.828125 232" style="max-width: 124.828125px;" role="graphics-document document" aria-roledescription="treeView"><style>#official-22-tree-view{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#E0E0E0;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#official-22-tree-view .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#official-22-tree-view .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#official-22-tree-view .error-icon{fill:#a44141;}#official-22-tree-view .error-text{fill:#ddd;stroke:#ddd;}#official-22-tree-view .edge-thickness-normal{stroke-width:1px;}#official-22-tree-view .edge-thickness-thick{stroke-width:3.5px;}#official-22-tree-view .edge-pattern-solid{stroke-dasharray:0;}#official-22-tree-view .edge-thickness-invisible{stroke-width:0;fill:none;}#official-22-tree-view .edge-pattern-dashed{stroke-dasharray:3;}#official-22-tree-view .edge-pattern-dotted{stroke-dasharray:2;}#official-22-tree-view .marker{fill:#AAAAAA;stroke:#AAAAAA;}#official-22-tree-view .marker.cross{stroke:#AAAAAA;}#official-22-tree-view svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#official-22-tree-view p{margin:0;}#official-22-tree-view .treeView-node-label{font-size:16px;fill:black;}#official-22-tree-view .treeView-node-line{stroke:black;}#official-22-tree-view .node .neo-node{stroke:#ccc;}#official-22-tree-view [data-look="neo"].node rect,#official-22-tree-view [data-look="neo"].cluster rect,#official-22-tree-view [data-look="neo"].node polygon{stroke:url(#official-22-tree-view-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#official-22-tree-view [data-look="neo"].node path{stroke:url(#official-22-tree-view-gradient);stroke-width:1px;}#official-22-tree-view [data-look="neo"].node .outer-path{filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#official-22-tree-view [data-look="neo"].node .neo-line path{stroke:#ccc;filter:none;}#official-22-tree-view [data-look="neo"].node circle{stroke:url(#official-22-tree-view-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#official-22-tree-view [data-look="neo"].node circle .state-start{fill:#000000;}#official-22-tree-view [data-look="neo"].icon-shape .icon{fill:url(#official-22-tree-view-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#official-22-tree-view [data-look="neo"].icon-shape .icon-neo path{stroke:url(#official-22-tree-view-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#official-22-tree-view :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g></g><g class="tree-view"><text dominant-baseline="middle" class="treeView-node-label" x="5" y="14.5">/</text><line x1="-10" y1="14.5" x2="0" y2="14.5" stroke-width="1" class="treeView-node-line"></line><text dominant-baseline="middle" class="treeView-node-label" x="20" y="43.5">Root</text><line x1="5" y1="43.5" x2="15" y2="43.5" stroke-width="1" class="treeView-node-line"></line><text dominant-baseline="middle" class="treeView-node-label" x="35" y="72.5">Runtime</text><line x1="20" y1="72.5" x2="30" y2="72.5" stroke-width="1" class="treeView-node-line"></line><text dominant-baseline="middle" class="treeView-node-label" x="50" y="101.5">V8</text><line x1="35" y1="101.5" x2="45" y2="101.5" stroke-width="1" class="treeView-node-line"></line><text dominant-baseline="middle" class="treeView-node-label" x="50" y="130.5">DOM shim</text><line x1="35" y1="130.5" x2="45" y2="130.5" stroke-width="1" class="treeView-node-line"></line><line x1="35" y1="87" x2="35" y2="131" stroke-width="1" class="treeView-node-line"></line><text dominant-baseline="middle" class="treeView-node-label" x="35" y="159.5">Output</text><line x1="20" y1="159.5" x2="30" y2="159.5" stroke-width="1" class="treeView-node-line"></line><text dominant-baseline="middle" class="treeView-node-label" x="50" y="188.5">SVG</text><line x1="35" y1="188.5" x2="45" y2="188.5" stroke-width="1" class="treeView-node-line"></line><text dominant-baseline="middle" class="treeView-node-label" x="50" y="217.5">Rasterize</text><line x1="35" y1="217.5" x2="45" y2="217.5" stroke-width="1" class="treeView-node-line"></line><line x1="35" y1="174" x2="35" y2="218" stroke-width="1" class="treeView-node-line"></line><line x1="20" y1="58" x2="20" y2="160" stroke-width="1" class="treeView-node-line"></line><line x1="5" y1="29" x2="5" y2="44" stroke-width="1" class="treeView-node-line"></line></g></svg>