services:
  ubuntu-webtop:
    # Pin the last known good build: ls269 crashes xfce4-panel on linux/amd64
    # and leaves the browser session on a black screen on Apple Silicon hosts.
    image: lscr.io/linuxserver/webtop:ubuntu-xfce-d40fbbf3-ls268
    container_name: katana-linux-test
    platform: linux/amd64
    security_opt:
      - seccomp:unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Tokyo
      - TITLE=Katana Linux Verification
      - CARGO_HOME=/config/.cargo
      - CARGO_TARGET_DIR=/config/workspace/katana/target
    volumes:
      - ../../:/config/workspace/katana
      - katana-linux-cargo:/config/.cargo
      # Linux release builds must not share macOS host artifacts.
      - katana-linux-target:/config/workspace/katana/target
    ports:
      - "3000:3000"
      - "3001:3001"
    shm_size: "1gb"
    restart: unless-stopped

volumes:
  katana-linux-cargo:
  katana-linux-target:
