name: Release Readiness

on:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-check:
    name: Release Readiness
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - name: Run PR readiness check
        shell: bash
        run: |
          if [[ "${GITHUB_HEAD_REF}" == release/* ]]; then
            version="${GITHUB_HEAD_REF#release/v}"
            version="${version%%-*}"
          else
            version="$(cat Cargo.toml | awk -F'\"' '/^version = / {print $2}')"
          fi

          if [[ -n "$version" ]]; then
            LATEST_LINUX_ASSET="https://github.com/HiroyukiFuruno/KatanA/releases/download/v${version}/KatanA-linux-x86_64.tar.gz"
            http_status=$(curl -sI -L "$LATEST_LINUX_ASSET" | awk '/^HTTP/{status=$2} END{print status}')
            if [[ "$http_status" != "200" && "$http_status" != "302" ]]; then
              echo "HTTP status check failed for: $LATEST_LINUX_ASSET"
              echo "Observed status: ${http_status:-unknown}"
              exit 1
            fi
          fi

          version=""
          if [[ "${GITHUB_HEAD_REF}" == release/v* ]]; then
            version="${GITHUB_HEAD_REF#release/v}"
            version="${version%%-*}"
          fi
          ./scripts/release/check-pr-ready.sh "$version"
