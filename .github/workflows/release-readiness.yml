name: Release Readiness

on:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-check:
    name: Release Readiness
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
      - name: Run PR readiness check
        shell: bash
        run: |
          if [[ "${GITHUB_HEAD_REF}" == release/* ]]; then
            version="${GITHUB_HEAD_REF#release/v}"
            version="${version%%-*}"
          else
            version="$(cat Cargo.toml | awk -F'\"' '/^version = / {print $2}')"
          fi

          ./scripts/release/check-pr-ready.sh "$version"
