# =============================================================================
# KatanA Desktop — Release CD
# =============================================================================
# Fully automated multi-platform release pipeline.
#
# Triggers:
#   1. release/vX.Y.Z branch merged into master  ← primary flow
#   2. Push of a version tag (v*)                ← legacy/emergency
#   3. Manual dispatch via `gh workflow run`     ← one-off/hotfix
#
# Flow (merge trigger):
#   1. preflight: Extract version from branch name → validate → extract release notes
#   2. build_{macos,linux,windows}: Build platform artifacts
#   3. publish: Create GitHub Release (tag + artifacts) via API, update Homebrew/Winget
#
# Security:
#   - Only the repository owner can trigger this workflow (filtered in preflight)
#   - Fork PRs will NOT trigger this workflow
# =============================================================================

name: Release

on:
  pull_request:
    types: [closed]
    branches:
      - master
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.18.1 or v0.18.1)'
        required: true
      target:
        description: 'Target to release'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - macOS
          - linux
          - windows
      force:
        description: 'Force overwrite existing release/tag'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preflight:
    name: Preflight Check
    runs-on: macos-latest
    # WHY: For PR merges, only trigger when a release/v* branch is merged into master
    if: |
      github.actor == 'HiroyukiFuruno' && (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' &&
          github.event.pull_request.merged == true &&
          startsWith(github.event.pull_request.head.ref, 'release/v'))
      )
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_bare: ${{ steps.version.outputs.version_bare }}
      commit_sha: ${{ steps.bump.outputs.commit_sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          ./scripts/release/get-version.sh \
            "${{ github.event_name }}" \
            "${{ github.event.inputs.version }}" \
            "${{ github.event.pull_request.head.ref }}" \
            "${{ github.ref }}" \
            "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Cache Cargo registry & build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-preflight-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-preflight-

      - name: Bump version and push (workflow_dispatch only)
        id: bump
        # WHY: PR merge flow already has Cargo.toml updated; only bump on manual dispatch or tag push
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        run: |
          ./scripts/release/bump-version.sh "${{ steps.version.outputs.version_bare }}"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Run release preflight logic
        run: ./scripts/release/preflight.sh "${{ steps.version.outputs.version }}"

      - name: Extract release notes from CHANGELOG.md
        run: |
          scripts/release/extract-notes.sh "${{ steps.version.outputs.version }}" > RELEASE_NOTES.md
          echo "--- Release notes for ${{ steps.version.outputs.version }} ---"
          cat RELEASE_NOTES.md

      - name: Upload Release Notes
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  build_macos:
    name: Build macOS
    needs: preflight
    runs-on: macos-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'macOS'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.preflight.outputs.commit_sha }}
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Install dependencies
        run: |
          command -v cargo-bundle || cargo install cargo-bundle
          brew install create-dmg
      - name: Clean stale DMG files
        run: rm -f target/release/KatanA-Desktop-*.dmg
      - name: Build macOS .app
        run: scripts/build/package-mac.sh "${{ needs.preflight.outputs.version_bare }}"
      - name: Codesign .app
        run: |
          APP_PATH=$(find target/release/bundle/osx -name "*.app" -maxdepth 1 | head -1)
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --verbose "$APP_PATH"
      - name: Build .dmg installer
        run: scripts/build/dmg.sh "${{ needs.preflight.outputs.version_bare }}"
      - name: Build .zip archive
        run: |
          APP_PATH=$(find target/release/bundle/osx -name "*.app" -maxdepth 1 | head -1)
          if [[ -n "$APP_PATH" ]]; then
            (cd "$(dirname "$APP_PATH")" && zip -r -q "../../KatanA-macOS.zip" "$(basename "$APP_PATH")")
            echo "Successfully built target/release/KatanA-macOS.zip"
          else
            exit 1
          fi
      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: artifacts-macos
          path: |
            target/release/KatanA-Desktop-*.dmg
            target/release/KatanA-macOS.zip

  build_linux:
    name: Build Linux
    needs: preflight
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'linux'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.preflight.outputs.commit_sha }}
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev gcc pkg-config libdbus-1-dev
      - name: Build release (Linux)
        run: cargo build --workspace --release
      - name: Package Linux Artifact
        run: scripts/build/package-linux.sh
      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: artifacts-linux
          path: target/release/KatanA-linux-x86_64.tar.gz

  build_windows:
    name: Build Windows
    needs: preflight
    runs-on: windows-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'windows'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.preflight.outputs.commit_sha }}
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build release (Windows)
        run: cargo build --workspace --release

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@6ed12bbaae779f3fd3ba1477bc9a61a2535a3bb2 # main

      - name: Package Windows Artifacts
        shell: bash
        run: scripts/build/package-windows.sh

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: artifacts-windows
          path: |
            KatanA-windows-x86_64.zip
            KatanA-windows-x86_64.msi

  publish:
    name: Publish Release
    needs: [preflight, build_macos, build_linux, build_windows]
    if: always() && needs.preflight.result == 'success' && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.preflight.outputs.commit_sha }}
      - name: Download all artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
      - name: Organize Artifacts
        run: ./scripts/release/collect-artifacts.sh release-files

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ./scripts/release/github-release.sh \
            "${{ needs.preflight.outputs.version }}" \
            "${{ needs.preflight.outputs.commit_sha }}" \
            "release-notes/RELEASE_NOTES.md" \
            "release-files" \
            "${{ github.event.inputs.force }}"

      - name: Sync External Registries
        if: success()
        env:
          HOMEBREW_KATANA_GIT_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.WINGET_GH_TOKEN || github.token }}
        run: |
          ./scripts/release/sync-external.sh \
            "${{ needs.preflight.outputs.version_bare }}" \
            "${{ needs.preflight.outputs.version }}" \
            "release-files"
