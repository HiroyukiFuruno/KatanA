# =============================================================================
# KatanA Desktop — Release CD
# =============================================================================
# Builds the macOS .app bundle and .dmg installer, then creates a GitHub Release
# with the artifacts attached.
#
# Triggers:
#   - Push of a version tag (v*)
#   - Manual dispatch (workflow_dispatch)
#
# Security:
#   - Only the repository owner can trigger this workflow
#   - Fork PRs will NOT trigger this workflow
# =============================================================================

name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.0.1)'
        required: true
      target:
        description: 'Target to release'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - macOS
          - linux
          - windows

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preflight:
    name: Preflight Check
    runs-on: macos-latest
    if: github.actor == 'HiroyukiFuruno'
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Determine version tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_TAG="${{ github.event.inputs.tag }}"
            if [[ $INPUT_TAG != v* ]]; then
              INPUT_TAG="v${INPUT_TAG}"
            fi
            echo "version=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Cache Cargo registry & build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          save-always: true
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-preflight-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-preflight-

      - name: Run release preflight logic
        run: ./scripts/release/preflight.sh "${{ steps.tag.outputs.version }}"

      - name: Extract release notes from CHANGELOG.md
        run: |
          scripts/release/extract-notes.sh "${{ steps.tag.outputs.version }}" > RELEASE_NOTES.md
          echo "--- Release notes for ${{ steps.tag.outputs.version }} ---"
          cat RELEASE_NOTES.md

      - name: Upload Release Notes
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  build_macos:
    name: Build macOS
    needs: preflight
    runs-on: macos-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'macOS'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          save-always: true
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
      - name: Install dependencies
        run: |
          command -v cargo-bundle || cargo install cargo-bundle
          brew install create-dmg
      - name: Clean stale DMG files
        run: rm -f target/release/KatanA-Desktop-*.dmg
      - name: Build .app bundle
        run: make package-mac
      - name: Ad-hoc code sign
        run: |
          APP_PATH=$(find target/release/bundle/osx -name "*.app" -maxdepth 1 | head -1)
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --verbose "$APP_PATH"
      - name: Build .dmg installer
        run: make dmg
      - name: Build .zip archive
        run: |
          APP_PATH=$(find target/release/bundle/osx -name "*.app" -maxdepth 1 | head -1)
          if [[ -n "$APP_PATH" ]]; then
            (cd "$(dirname "$APP_PATH")" && zip -r -q "../../KatanA-macOS.zip" "$(basename "$APP_PATH")")
            echo "Successfully built target/release/KatanA-macOS.zip"
          else
            exit 1
          fi
      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: artifacts-macos
          path: |
            target/release/KatanA-Desktop-*.dmg
            target/release/KatanA-macOS.zip

  build_linux:
    name: Build Linux
    needs: preflight
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'linux'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          save-always: true
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev gcc pkg-config libdbus-1-dev
      - name: Build release (Linux)
        run: cargo build --workspace --release
      - name: Package Linux Artifact
        run: ./scripts/package-linux.sh
      - name: Update Linuxbrew Formula
        env:
          HOMEBREW_KATANA_GIT_TOKEN: ${{ secrets.HOMEBREW_KATANA_GIT_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          TAR_NAME="KatanA-linux-x86_64.tar.gz"
          cd target/release
          SHA256=$(shasum -a 256 "$TAR_NAME" | awk '{print $1}')
          cd ../..
          
          if [[ -n "$HOMEBREW_KATANA_GIT_TOKEN" ]]; then
            echo "Publishing to Linuxbrew..."
            ./scripts/release/update-linuxbrew.sh "$VERSION" "$SHA256" "$TAR_NAME" || echo "Warning: Linuxbrew update failed but won't block release."
          else
            echo "Skipping Linuxbrew update (HOMEBREW_KATANA_GIT_TOKEN missing in Action secrets)"
          fi
      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: artifacts-linux
          path: target/release/KatanA-linux-x86_64.tar.gz

  build_windows:
    name: Build Windows
    needs: preflight
    runs-on: windows-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'windows'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v4.1.2
        with:
          save-always: true
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
      - name: Build release (Windows)
        run: cargo build --workspace --release
        
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@6ed12bbaae779f3fd3ba1477bc9a61a2535a3bb2 # main

      - name: Package Windows Artifacts
        shell: bash
        run: ./scripts/package-windows.sh

      - name: Install Komac
        if: env.WINGET_GH_TOKEN != ''
        env:
          WINGET_GH_TOKEN: ${{ secrets.WINGET_GH_TOKEN }}
        run: cargo binstall komac -y

      - name: Submit to Winget
        if: env.WINGET_GH_TOKEN != ''
        env:
          GITHUB_TOKEN: ${{ secrets.WINGET_GH_TOKEN }}
          WINGET_GH_TOKEN: ${{ secrets.WINGET_GH_TOKEN }}
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}" -replace "^v",""
          komac update HiroyukiFuruno.katana-desktop --version $VERSION --urls "https://github.com/HiroyukiFuruno/KatanA/releases/download/${{ github.ref_name }}/KatanA-windows-x86_64.msi" --submit
      - name: Warning for missing Winget Token
        if: env.WINGET_GH_TOKEN == ''
        env:
          WINGET_GH_TOKEN: ${{ secrets.WINGET_GH_TOKEN }}
        run: echo "Skipping Winget publication (WINGET_GH_TOKEN missing in Action secrets)"
      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: artifacts-windows
          path: |
            target/release/KatanA-windows-x86_64.zip
            KatanA-windows-x86_64.msi

  publish:
    name: Publish Release
    needs: [preflight, build_macos, build_linux, build_windows]
    if: always() && needs.preflight.result == 'success' && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Download all artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
      - name: Organize Artifacts
        run: |
          mkdir -p release-files
          mv artifacts-macos/* release-files/ || true
          mv artifacts-linux/* release-files/ || true
          mv artifacts-windows/* release-files/ || true
          cd release-files
          shasum -a 256 * > checksums.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ needs.preflight.outputs.version }}
          name: KatanA Desktop ${{ needs.preflight.outputs.version }}
          body_path: release-notes/RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Cask
        if: success()
        env:
          HOMEBREW_KATANA_GIT_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          DMG=$(find release-files -name "KatanA-Desktop-*.dmg" -maxdepth 1 | sort -V | tail -1)
          SHA256=$(shasum -a 256 "$DMG" | awk '{print $1}')
          DMG_NAME=$(basename "$DMG")
          scripts/release/update-homebrew.sh "${{ needs.preflight.outputs.version }}" "$SHA256" "$DMG_NAME"

      - name: Update Linuxbrew Formula
        if: success()
        env:
          HOMEBREW_KATANA_GIT_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAR=$(find release-files -name "KatanA-linux-*.tar.gz" -maxdepth 1 | sort -V | tail -1)
          SHA256=$(shasum -a 256 "$TAR" | awk '{print $1}')
          TAR_NAME=$(basename "$TAR")
          scripts/release/update-linuxbrew.sh "${{ needs.preflight.outputs.version }}" "$SHA256" "$TAR_NAME"
